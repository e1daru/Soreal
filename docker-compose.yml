services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - surrealdb
      - ollama
    environment:
      PYTHONUNBUFFERED: "1"
      SURREAL_URL: ws://surrealdb:8000/rpc
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "8001:8001"
    volumes:
      - huggingface-cache:/root/.cache/huggingface
    restart: unless-stopped

  surrealdb:
    image: surrealdb/surrealdb:latest
    user: "0:0"
    command:
      - start
      - --log
      - info
      - --bind
      - 0.0.0.0:8000
      - --user
      - ${SURREAL_USERNAME:-root}
      - --pass
      - ${SURREAL_PASSWORD:-root}
      - rocksdb:/var/lib/surrealdb/soreal.db
    ports:
      - "8000:8000"
    volumes:
      - surreal-data:/var/lib/surrealdb
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  huggingface-cache:
  surreal-data:
  ollama-data:
